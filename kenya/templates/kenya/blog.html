{% extends 'base.html' %}

{% block content %}

<section>

```
<div class="container">

    <h2>Blog Posts</h2>

    <div class="project-grid">

        {% for blog in blogs %}

        <div class="project-card">

            {% if blog.image %}
            <img src="{{ blog.image.url }}"
                 alt="{{ blog.title }}">
            {% endif %}

            <div class="project-content">

                <h3>{{ blog.title }}</h3>

                <p>{{ blog.content|truncatewords:40 }}</p>

                <br>

                <small>
                    Published:
                    {{ blog.published }}
                </small>

            </div>

        </div>

        {% empty %}

        <p>No blog posts available yet.</p>

        {% endfor %}

    </div>

</div>
```

</section>

{% endblock %}
